<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#78350f">
  <link rel="manifest" href="manifest.json">
  <title>Universal Tuner 5.0</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    body { 
      font-family: 'VT323', monospace;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .needle { transition: transform 0.15s cubic-bezier(0.25, 0.1, 0.25, 1); }
    .red-needle { transition: left 0.15s ease-out; }
    .in-tune { animation: pulse 1.4s infinite; }
    @keyframes pulse { 
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); } 
      50% { box-shadow: 0 0 0 18px rgba(74, 222, 128, 0); } 
    }
  </style>
</head>
<body class="bg-zinc-950 text-amber-100 min-h-screen pb-20">
  <div class="max-w-2xl mx-auto px-5 pt-8">

    <!-- Mode Selector -->
    <div class="flex justify-center mb-10">
      <div class="inline-flex bg-zinc-900 rounded-3xl p-1.5 border border-amber-800">
        <button onclick="setMode(0)" id="btn0" class="px-7 py-3 rounded-3xl font-bold text-lg transition-all">Analog Dial</button>
        <button onclick="setMode(1)" id="btn1" class="px-7 py-3 rounded-3xl font-bold text-lg transition-all">AM/FM Radio</button>
        <button onclick="setMode(2)" id="btn2" class="px-7 py-3 rounded-3xl font-bold text-lg transition-all bg-emerald-700">Digital</button>
      </div>
    </div>

    <!-- Instrument & Tuning -->
    <div class="grid grid-cols-2 gap-6 mb-10">
      <div>
        <label class="block text-xs uppercase tracking-widest text-amber-400 mb-2">Instrument</label>
        <select id="instrumentSelect" onchange="updateTunings()" 
          class="w-full bg-zinc-900 border border-amber-700 rounded-2xl px-6 py-4 text-xl focus:outline-none focus:border-emerald-500">
        </select>
      </div>
      <div>
        <label class="block text-xs uppercase tracking-widest text-amber-400 mb-2">Tuning</label>
        <select id="tuningSelect" onchange="loadTargets()" 
          class="w-full bg-zinc-900 border border-amber-700 rounded-2xl px-6 py-4 text-xl focus:outline-none focus:border-emerald-500">
        </select>
      </div>
    </div>

    <!-- Analog Dial Mode -->
    <div id="mode0" class="mode">
      <div class="bg-gradient-to-br from-amber-950 to-amber-900 p-10 rounded-3xl border-8 border-amber-800">
        <div class="relative w-80 h-80 mx-auto">
          <svg class="w-full h-full -rotate-90" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="88" fill="none" stroke="#3f2a1e" stroke-width="26"/>
            <circle id="gaugeArc0" cx="100" cy="100" r="77" fill="none" stroke="#fcd34d" stroke-width="18" stroke-dasharray="484" stroke-dashoffset="242" stroke-linecap="round"/>
            <line id="needle0" x1="100" y1="100" x2="100" y2="24" stroke="#ff3333" stroke-width="8" stroke-linecap="round" class="needle"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center z-10">
            <div id="note0" class="text-8xl font-bold text-amber-100">—</div>
            <div id="cents0" class="text-6xl text-yellow-300 -mt-3">0</div>
          </div>
        </div>
      </div>
    </div>

    <!-- AM/FM Radio Mode -->
    <div id="mode1" class="mode hidden">
      <div class="bg-black border-8 border-amber-800 p-8 rounded-3xl">
        <div class="text-center text-amber-400 text-sm mb-4 tracking-widest">TUNING SCALE</div>
        <div class="relative h-32 bg-zinc-950 border border-amber-600 rounded-xl overflow-hidden">
          <div id="needle1" class="red-needle absolute w-1 bg-red-600 left-1/2 top-3 bottom-3 shadow-[0_0_15px_#ff4444]"></div>
          <div class="absolute inset-x-0 bottom-6 flex justify-between px-8 text-xs text-amber-400">
            <span>-50</span><span>-30</span><span>-10</span><span class="text-emerald-400 font-bold">0</span><span>+10</span><span>+30</span><span>+50</span>
          </div>
        </div>
        <div class="flex justify-between items-baseline mt-6 px-4">
          <div class="text-amber-400">FLAT</div>
          <div id="note1" class="text-6xl font-bold text-white">—</div>
          <div class="text-amber-400">SHARP</div>
        </div>
        <div id="cents1" class="text-center text-3xl text-yellow-300 mt-2">0 cents</div>
      </div>
    </div>

    <!-- Digital Mode -->
    <div id="mode2" class="mode">
      <div class="bg-zinc-900 border border-emerald-700 rounded-3xl p-12 text-center">
        <div id="note2" class="text-[5.5rem] leading-none font-bold text-white tracking-[-2px]">—</div>
        <div id="freq2" class="text-emerald-400 text-3xl mt-3">— Hz</div>
        <div class="h-px bg-zinc-700 my-8"></div>
        <div id="cents2" class="text-7xl font-bold text-yellow-300">0</div>
        <div class="text-xs uppercase tracking-[3px] text-zinc-400 mt-1">CENTS DEVIATION</div>
      </div>
    </div>

    <!-- Status -->
    <div id="status" class="text-center mt-8 text-emerald-400 text-2xl font-bold">PLAY A STRING</div>

    <!-- Target Strings -->
    <div class="mt-12">
      <p class="uppercase text-xs tracking-widest text-amber-400 mb-4 px-1">TARGET STRINGS</p>
      <div id="targetsList" class="grid grid-cols-3 gap-4"></div>
    </div>

    <!-- Mic Button -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
      <button onclick="toggleListening()" id="micBtn"
        class="bg-red-600 hover:bg-red-500 px-12 py-5 rounded-3xl text-2xl font-bold flex items-center gap-4 shadow-2xl active:scale-95 transition-all">
        <i class="fas fa-microphone"></i>
        <span id="micText">START LISTENING</span>
      </button>
    </div>
  </div>

  <script>
    let currentMode = 2;

    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode').forEach(m => m.classList.add('hidden'));
      document.getElementById(`mode${mode}`).classList.remove('hidden');

      for (let i = 0; i < 3; i++) {
        const btn = document.getElementById(`btn${i}`);
        if (i === mode) btn.classList.add('bg-emerald-700');
        else btn.classList.remove('bg-emerald-700');
      }
    }

    // ==================== TUNER LOGIC ====================
    const INSTRUMENTS = {
      guitar: { name: "Guitar", tunings: {
        "Standard": ["E2","A2","D3","G3","B3","E4"],
        "Open A": ["E2","A2","C#3","E3","A3","E4"],
        "Open D": ["D2","A2","D3","F#3","A3","D4"],
        "Open E": ["E2","B2","E3","G#3","B3","E4"],
        "Drop D": ["D2","A2","D3","G3","B3","E4"],
        "DADGAD": ["D2","A2","D3","G3","A3","D4"]
      }},
      violin: { name: "Violin", tunings: { "Standard": ["G3","D4","A4","E5"] }},
      cello:  { name: "Cello", tunings: { "Standard": ["C2","G2","D3","A3"] }},
      ukulele:{ name: "Ukulele", tunings: { "Standard": ["G4","C4","E4","A4"] }},
      bass:   { name: "Bass", tunings: { "Standard": ["E1","A1","D2","G2"] }},
      chromatic: { name: "Chromatic", tunings: { "Any": [] }}
    };

    const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

    function freqToNote(freq) {
      if (freq <= 0) return { note: "—", cents: 0, freq: "0.0" };
      const h = Math.round(12 * Math.log2(freq / 440));
      const octave = 4 + Math.floor(h / 12);
      const noteIdx = (9 + h) % 12;
      const targetFreq = 440 * Math.pow(2, h / 12);
      const cents = Math.round(1200 * Math.log2(freq / targetFreq));
      return { note: `${NOTES[noteIdx]}${octave}`, cents, freq: freq.toFixed(1) };
    }

    function noteToFreq(note) {
      const n = note.slice(0,-1);
      const o = parseInt(note.slice(-1));
      const idx = NOTES.indexOf(n);
      return 440 * Math.pow(2, (idx - 9 + 12*(o-4)) / 12);
    }

    let audioContext, scriptProcessor, stream;
    let isListening = false;
    let currentTargets = [];

    function populateInstruments() {
      const sel = document.getElementById("instrumentSelect");
      sel.innerHTML = Object.keys(INSTRUMENTS).map(k => 
        `<option value="${k}">${INSTRUMENTS[k].name}</option>`
      ).join("");
    }

    function updateTunings() {
      const instr = document.getElementById("instrumentSelect").value;
      const sel = document.getElementById("tuningSelect");
      sel.innerHTML = Object.keys(INSTRUMENTS[instr].tunings).map(t => 
        `<option value="${t}">${t}</option>`
      ).join("");
      loadTargets();
    }

    function loadTargets() {
      const instr = document.getElementById("instrumentSelect").value;
      const tuning = document.getElementById("tuningSelect").value;
      currentTargets = INSTRUMENTS[instr].tunings[tuning] || [];
      
      const container = document.getElementById("targetsList");
      container.innerHTML = currentTargets.map(note => `
        <div id="card-${note}" class="bg-zinc-900 border border-zinc-700 rounded-2xl p-6 text-center transition-all">
          <div class="text-4xl font-bold">${note}</div>
          <div id="status-${note}" class="text-xs text-zinc-400 mt-2">—</div>
        </div>
      `).join("") || `<div class="col-span-3 text-center py-10 text-zinc-500">Play any note</div>`;
    }

    function detectPitch(buffer) {
      const SIZE = buffer.length;
      let bestOffset = -1, bestCorrelation = 0, rms = 0;
      for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
      rms = Math.sqrt(rms / SIZE);
      if (rms < 0.015) return 0;

      for (let offset = Math.floor(SIZE * 0.02); offset < SIZE * 0.45; offset++) {
        let correlation = 0;
        for (let i = 0; i < SIZE - offset; i++) {
          correlation += Math.abs(buffer[i] - buffer[i + offset]);
        }
        correlation = 1 - (correlation / (SIZE - offset));
        if (correlation > bestCorrelation) {
          bestCorrelation = correlation;
          bestOffset = offset;
        }
      }
      return bestCorrelation > 0.28 ? audioContext.sampleRate / bestOffset : 0;
    }

    function startAudio() {
      navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } })
        .then(s => {
          stream = s;
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

          scriptProcessor.onaudioprocess = (e) => {
            const freq = detectPitch(e.inputBuffer.getChannelData(0));
            if (freq < 60 || freq > 2000) return;

            const data = freqToNote(freq);

            // Update displays
            document.getElementById("note0").textContent = data.note;
            document.getElementById("cents0").textContent = data.cents;
            document.getElementById("note1").textContent = data.note;
            document.getElementById("cents1").textContent = data.cents + " cents";
            document.getElementById("note2").textContent = data.note;
            document.getElementById("freq2").textContent = data.freq + " Hz";
            document.getElementById("cents2").textContent = data.cents;

            // Analog needle
            const angle = Math.max(-50, Math.min(50, data.cents)) * 1.8;
            document.getElementById("needle0").setAttribute("transform", `rotate(${angle} 100 100)`);

            // AM/FM horizontal needle
            const percent = Math.max(0, Math.min(100, (data.cents + 50)));
            document.getElementById("needle1").style.left = `${percent}%`;

            // Target highlighting
            if (currentTargets.length > 0) {
              let closest = currentTargets[0];
              let minDiff = Infinity;
              currentTargets.forEach(t => {
                const diff = Math.abs(freq - noteToFreq(t));
                if (diff < minDiff) { minDiff = diff; closest = t; }
              });

              currentTargets.forEach(t => {
                const card = document.getElementById(`card-${t}`);
                const st = document.getElementById(`status-${t}`);
                if (t === closest) {
                  card.classList.add('border-emerald-500', 'in-tune');
                  st.textContent = Math.abs(data.cents) < 8 ? "IN TUNE" : "CLOSE";
                } else {
                  card.classList.remove('border-emerald-500', 'in-tune');
                  st.textContent = "—";
                }
              });
            }
          };

          source.connect(scriptProcessor);
          scriptProcessor.connect(audioContext.destination);
          isListening = true;
          document.getElementById("micText").textContent = "LISTENING";
        })
        .catch(() => alert("Microphone access is required"));
    }

    function toggleListening() {
      if (isListening) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (scriptProcessor) scriptProcessor.disconnect();
        isListening = false;
        document.getElementById("micText").textContent = "START LISTENING";
      } else {
        startAudio();
      }
    }

    // Initialize
    window.onload = () => {
      populateInstruments();
      updateTunings();
      setMode(2); // Start with Digital mode
    };
  </script>
</body>
</html>
